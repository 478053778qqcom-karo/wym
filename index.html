<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>掐丝珐琅 · 文化体验计划</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    font-family:'Noto Serif SC',serif;
    background:#0f0f0f;
    color:#f5f5f5;
    line-height:1.8;
    letter-spacing:0.5px;
}

section{
    padding:100px 15%;
}

h1{
    font-size:48px;
    font-weight:300;
}

h2{
    font-size:30px;
    font-weight:400;
    margin-bottom:30px;
}

p{
    max-width:800px;
    opacity:0.85;
}

.highlight{
    font-size:22px;
    margin-top:30px;
}

.hero{
    height:100vh;
    background:url("images/detail.jpg") center/cover no-repeat;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
}

.hero-overlay{
    background:rgba(0,0,0,0.65);
    padding:60px;
    text-align:center;
}

.fade{
    opacity:0;
    transform:translateY(40px);
    transition:all 1s ease;
}

.fade.show{
    opacity:1;
    transform:translateY(0);
}

/* 翻转卡片 */

.flip-card{
  width:100%;
  height:260px;
  perspective:1000px;
  margin-bottom:40px;
}

.flip-card-inner{
  position:relative;
  width:100%;
  height:100%;
  transition:transform 0.8s;
  transform-style:preserve-3d;
}

.flip-card:hover .flip-card-inner{
  transform:rotateY(180deg);
}

.flip-card-front, .flip-card-back{
  position:absolute;
  width:100%;
  height:100%;
  backface-visibility:hidden;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:30px;
  background:#1a1a1a;
  border:1px solid rgba(255,255,255,0.08);
}

.flip-card-front{
    font-size:22px;
}

.flip-card-back{
  transform:rotateY(180deg);
  flex-direction:column;
}

.flip-card-back img{
  width:70%;
  margin-bottom:15px;
}

footer{
    text-align:center;
    padding:60px;
    opacity:0.6;
}

</style>
</head>

<body>

<section class="hero">
    <div class="hero-overlay">
        <h1>掐丝珐琅 · 当代城市文化体验计划</h1>
        <p class="highlight">
        让传统工艺不止于陈列，而成为可触摸、可参与、可转化的城市文化现场。
        </p>
    </div>
</section>

<section class="fade">
<h2>项目理念</h2>
<p>
本项目以掐丝珐琅为核心，
结合城市文化语境进行创造性转化，
构建兼具体验性与传播力的文化空间。
</p>

<img src="images/craft.jpg" style="width:100%;margin-top:40px;">
</section>

<section class="fade">
<h2>产品体系</h2>

<div class="flip-card">
  <div class="flip-card-inner">
    <div class="flip-card-front">
      掐丝珐琅画手作体验
    </div>
    <div class="flip-card-back">
      <img src="images/product1.jpg">
      <p>由专业美术指导协助构图，顾客完成完整画作。</p>
    </div>
  </div>
</div>

<div class="flip-card">
  <div class="flip-card-inner">
    <div class="flip-card-front">
      工艺饰品体验
    </div>
    <div class="flip-card-back">
      <img src="images/product2.jpg">
      <p>制作吊坠、首饰等小型作品，降低体验门槛。</p>
    </div>
  </div>
</div>

</section>

<footer>
© 文化体验创业构想展示页
</footer>

<script>
const faders = document.querySelectorAll('.fade');

const appearOptions = {
    threshold: 0.2
};

const appearOnScroll = new IntersectionObserver(function(entries, observer){
    entries.forEach(entry=>{
        if(!entry.isIntersecting) return;
        entry.target.classList.add('show');
        observer.unobserve(entry.target);
    });
}, appearOptions);

faders.forEach(fader=>{
    appearOnScroll.observe(fader);
});
</script>

</body>
</html>
